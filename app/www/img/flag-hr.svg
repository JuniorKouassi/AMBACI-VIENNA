<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <rect width="900" height="200" fill="#FF0000"/>
  <rect y="200" width="900" height="200" fill="#FFFFFF"/>
  <rect y="400" width="900" height="200" fill="#171796"/>
  <!-- Checkerboard shield (šahovnica) simplified -->
  <g transform="translate(370,120)">
    <path d="M0,0 L160,0 L160,220 Q160,300 80,340 Q0,300 0,220 Z" fill="#FFFFFF" stroke="#999" stroke-width="3"/>
    <!-- 5x5 checkerboard -->
    <g fill="#FF0000">
      <rect x="8"  y="8"  width="28" height="28"/>
      <rect x="64" y="8"  width="28" height="28"/>
      <rect x="120" y="8" width="28" height="28"/>
      <rect x="36" y="36" width="28" height="28"/>
      <rect x="92" y="36" width="28" height="28"/>
      <rect x="8"  y="64" width="28" height="28"/>
      <rect x="64" y="64" width="28" height="28"/>
      <rect x="120" y="64" width="28" height="28"/>
      <rect x="36" y="92" width="28" height="28"/>
      <rect x="92" y="92" width="28" height="28"/>
      <rect x="8"  y="120" width="28" height="28"/>
      <rect x="64" y="120" width="28" height="28"/>
      <rect x="120" y="120" width="28" height="28"/>
    </g>
  </g>
</svg>
