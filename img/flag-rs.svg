<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <rect width="900" height="200" fill="#C6363C"/>
  <rect y="200" width="900" height="200" fill="#0C4076"/>
  <rect y="400" width="900" height="200" fill="#FFFFFF"/>
  <!-- Simplified coat of arms: eagle -->
  <g transform="translate(120,80)">
    <!-- White eagle silhouette (very simplified) -->
    <ellipse cx="60" cy="50" rx="30" ry="35" fill="#FFFFFF"/>
    <ellipse cx="30" cy="90" rx="25" ry="15" fill="#FFFFFF" transform="rotate(-30,30,90)"/>
    <ellipse cx="90" cy="90" rx="25" ry="15" fill="#FFFFFF" transform="rotate(30,90,90)"/>
    <rect x="48" y="80" width="24" height="60" fill="#FFFFFF"/>
    <!-- Crown -->
    <rect x="40" y="10" width="40" height="12" fill="#FFD700"/>
    <polygon points="40,10 50,0 50,10" fill="#FFD700"/>
    <polygon points="60,10 60,0 70,10" fill="#FFD700"/>
    <polygon points="80,10 80,0 70,10" fill="#FFD700"/>
    <!-- Red shield on chest -->
    <path d="M48,92 L72,92 L72,120 Q72,132 60,138 Q48,132 48,120 Z" fill="#C6363C"/>
    <rect x="55" y="94" width="10" height="40" fill="#FFD700"/>
    <rect x="48" y="108" width="24" height="10" fill="#FFD700"/>
  </g>
</svg>
