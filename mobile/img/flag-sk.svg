<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <rect width="900" height="200" fill="#FFFFFF"/>
  <rect y="200" width="900" height="200" fill="#0B4EA2"/>
  <rect y="400" width="900" height="200" fill="#EE1C25"/>
  <!-- Coat of arms: white shield with double cross on hills -->
  <g transform="translate(100,90)">
    <path d="M0,0 L90,0 L90,180 Q90,240 45,270 Q0,240 0,180 Z" fill="#FFFFFF" stroke="#0B4EA2" stroke-width="4"/>
    <!-- Red background inside shield -->
    <path d="M6,6 L84,6 L84,180 Q84,236 45,264 Q6,236 6,180 Z" fill="#EE1C25"/>
    <!-- Three green hills -->
    <ellipse cx="22" cy="195" rx="22" ry="14" fill="#3D8042"/>
    <ellipse cx="45" cy="185" rx="22" ry="14" fill="#3D8042"/>
    <ellipse cx="68" cy="195" rx="22" ry="14" fill="#3D8042"/>
    <!-- Double cross (white) -->
    <rect x="36" y="100" width="18" height="90" fill="#FFFFFF"/>
    <rect x="20" y="128" width="50" height="14" fill="#FFFFFF"/>
    <rect x="20" y="108" width="50" height="14" fill="#FFFFFF"/>
  </g>
</svg>
